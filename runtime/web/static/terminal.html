<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PiClaw Terminal</title>
  <link rel="stylesheet" href="/static/css/fonts.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #11111b;
      color: #cdd6f4;
      overflow: hidden;
    }
    #terminal-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    #status {
      height: 22px;
      background: #181825;
      border-top: 1px solid #313244;
      display: flex;
      align-items: center;
      padding: 0 8px;
      font-size: 11px;
      font-family: var(--font-mono, monospace);
      color: #6c7086;
      flex-shrink: 0;
    }
    #status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #f38ba8;
      margin-right: 6px;
      transition: background 0.3s;
    }
    #status .dot.connected {
      background: #a6e3a1;
    }
  </style>
</head>
<body>
  <div id="terminal-container"></div>
  <div id="status">
    <span class="dot" id="status-dot"></span>
    <span id="status-text">Connecting...</span>
  </div>

  <script type="module">
    // Load ghostty-web from vendored JS
    import { init, Terminal, FitAddon } from '/static/js/vendor/ghostty-web.js';

    const THEME = {
      foreground: '#cdd6f4',
      background: '#11111b',
      cursor: '#f5e0dc',
      cursorAccent: '#11111b',
      selectionBackground: '#45475a',
      selectionForeground: '#cdd6f4',
      black: '#45475a',
      red: '#f38ba8',
      green: '#a6e3a1',
      yellow: '#f9e2af',
      blue: '#89b4fa',
      magenta: '#f5c2e7',
      cyan: '#94e2d5',
      white: '#bac2de',
      brightBlack: '#585b70',
      brightRed: '#f38ba8',
      brightGreen: '#a6e3a1',
      brightYellow: '#f9e2af',
      brightBlue: '#89b4fa',
      brightMagenta: '#f5c2e7',
      brightCyan: '#94e2d5',
      brightWhite: '#a6adc8',
    };

    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');

    function setStatus(connected, msg) {
      if (connected) {
        statusDot.classList.add('connected');
      } else {
        statusDot.classList.remove('connected');
      }
      statusText.textContent = msg;
    }

    async function main() {
      // Initialize WASM
      await init();

      // Fetch session info
      let sessionInfo;
      try {
        const resp = await fetch('/terminal/session', { credentials: 'same-origin' });
        sessionInfo = await resp.json();
      } catch (err) {
        setStatus(false, 'Failed to fetch session info');
        console.error('[terminal] failed to fetch session info:', err);
        return;
      }

      // Create terminal
      const container = document.getElementById('terminal-container');
      const terminal = new Terminal({
        fontFamily: '"JetBrains Mono NF", monospace',
        fontSize: 13,
        theme: THEME,
        cursorBlink: true,
        cursorStyle: 'block',
        scrollback: 5000,
      });

      const fitAddon = new FitAddon();
      terminal.loadAddon(fitAddon);
      terminal.open(container);

      // Wait for fonts, then fit
      try { await document.fonts.ready; } catch (_) {}
      fitAddon.fit();
      fitAddon.observeResize();

      // Connect WebSocket
      const wsPath = (sessionInfo && sessionInfo.ws_path) || '/terminal/ws';
      const wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + wsPath;
      let activeWs = null;
      let reconnectTimer = null;

      const sendToActiveSocket = (payload) => {
        if (activeWs && activeWs.readyState === WebSocket.OPEN) {
          activeWs.send(JSON.stringify(payload));
        }
      };

      const inputDisposable = terminal.onData((data) => {
        sendToActiveSocket({ type: 'input', data });
      });

      const resizeDisposable = terminal.onResize(({ cols, rows }) => {
        sendToActiveSocket({ type: 'resize', cols, rows });
      });

      const clearReconnectTimer = () => {
        if (reconnectTimer !== null) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
      };

      function connect() {
        clearReconnectTimer();
        const ws = new WebSocket(wsUrl);
        activeWs = ws;
        setStatus(false, 'Connecting...');

        ws.addEventListener('open', () => {
          if (activeWs !== ws) return;
          setStatus(true, 'Connected');
          const dims = fitAddon.proposeDimensions();
          if (dims) {
            ws.send(JSON.stringify({ type: 'resize', cols: dims.cols, rows: dims.rows }));
          }
        });

        ws.addEventListener('message', (event) => {
          try {
            const msg = JSON.parse(event.data);
            if (msg.type === 'output' && typeof msg.data === 'string') {
              terminal.write(msg.data);
            } else if (msg.type === 'session') {
              // Session connected
              if (msg.cols && msg.rows) {
                const dims = fitAddon.proposeDimensions();
                if (!dims) terminal.resize(msg.cols, msg.rows);
              }
            }
          } catch (_) {
            if (typeof event.data === 'string') {
              terminal.write(event.data);
            }
          }
        });

        ws.addEventListener('close', () => {
          if (activeWs !== ws) return;
          activeWs = null;
          setStatus(false, 'Reconnecting...');
          clearReconnectTimer();
          reconnectTimer = setTimeout(connect, 3000);
        });

        ws.addEventListener('error', (err) => {
          console.error('[terminal] websocket error:', err);
        });
      }

      connect();

      window.addEventListener('beforeunload', () => {
        clearReconnectTimer();
        inputDisposable.dispose();
        resizeDisposable.dispose();
        if (activeWs && activeWs.readyState === WebSocket.OPEN) {
          activeWs.close();
        }
        activeWs = null;
      }, { once: true });
    }

    main().catch((err) => {
      console.error('[terminal] init error:', err);
      document.getElementById('status-text').textContent = 'Error: ' + err.message;
    });
  </script>
</body>
</html>
