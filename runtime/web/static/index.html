<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- CSP is set by the backend via HTTP header (security.ts). Do not add a meta tag CSP here
       — dual CSPs create a more restrictive intersection that breaks terminal WASM loading. -->
  <title>PiClaw Monaco</title>
  <!-- Preload critical fonts to eliminate render-blocking chain and CLS -->
  <link rel="preload" href="/static/fonts/ibm-plex-sans/IBMPlexSans-Regular.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/static/fonts/ibm-plex-sans/IBMPlexSans-SemiBold.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/static/fonts/jetbrains-mono-nf/JetBrainsMonoNFM-Regular.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/static/fonts/codicons/codicon.ttf" as="font" type="font/ttf" crossorigin />
  <link rel="stylesheet" href="/static/css/fonts.css" />
  <link rel="stylesheet" href="/static/css/codicons.css" />
  <link rel="stylesheet" href="/static/css/shell.css" />
  <link rel="stylesheet" href="/static/css/katex.min.css" />
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <!-- Vendor: markdown rendering (deferred — not blocking LCP) -->
  <script src="/static/js/marked.min.js" defer></script>
  <script src="/static/js/vendor/dompurify.min.js" defer></script>
  <script src="/static/js/vendor/katex.min.js" defer></script>
  <script src="/static/js/vendor/codemirror-highlight.min.js" defer></script>
  <script src="/static/js/vendor/adaptivecards.min.js" defer></script>
  <!-- Mermaid is huge (~1.5MB) — loaded on demand, NOT via script tag -->
  <script src="/static/dist/app.bundle.js" defer></script>
</body>
</html>
