<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- CSP is set by the backend via HTTP header (security.ts). Do not add a meta tag CSP here
       — dual CSPs create a more restrictive intersection that breaks terminal WASM loading. -->
  <title>PiClaw Monaco</title>
  <link rel="stylesheet" href="/static/css/fonts.css" />
  <link rel="stylesheet" href="/static/css/codicons.css" />
  <link rel="stylesheet" href="/static/css/shell.css" />
  <link rel="stylesheet" href="/static/css/katex.min.css" />
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <!-- Vendor: markdown rendering (deferred — not blocking LCP) -->
  <!-- Mermaid is huge (~1.5MB) — loaded on demand, NOT via script tag -->
  <script type="module" src="/static/dist/app.bundle.js"></script>
</body>
</html>
