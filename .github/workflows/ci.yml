name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'runtime/web/**'
      - 'runtime/src/**'
      - 'runtime/test/**'
      - 'runtime/extensions/**'
      - 'runtime/scripts/**'
      - 'package.json'
      - 'bun.lock'
      - 'Makefile'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'runtime/web/**'
      - 'runtime/src/**'
      - 'runtime/test/**'
      - 'runtime/extensions/**'
      - 'runtime/scripts/**'
      - 'package.json'
      - 'bun.lock'
      - 'Makefile'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  web-build:
    name: Build web UI + frontend regression checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run canonical fast CI contract
        run: make ci-fast

  visual-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - run: bun install --frozen-lockfile
      - run: bun run build:web
