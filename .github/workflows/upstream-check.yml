name: Check upstream releases
on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday 8am UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch upstream tags
        run: |
          git remote add upstream https://github.com/rcarmo/piclaw.git || true
          git fetch upstream --tags
      - name: Check for new release
        id: check
        run: |
          SYNCED=$(cat .piclaw-monaco-upstream-tag 2>/dev/null || echo "v0.0.0")
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          echo "synced=$SYNCED" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          if [ "$LATEST" != "$SYNCED" ]; then
            echo "new_release=true" >> $GITHUB_OUTPUT
          else
            echo "new_release=false" >> $GITHUB_OUTPUT
          fi
      - name: Create issue for new release
        if: steps.check.outputs.new_release == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const synced = '${{ steps.check.outputs.synced }}';
            const latest = '${{ steps.check.outputs.latest }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Upstream release ${latest} available (currently synced: ${synced})`,
              body: `A new upstream release \`${latest}\` is available from rcarmo/piclaw.\n\nCurrent synced tag: \`${synced}\`\n\nFollow the sync strategy in \`docs/UPSTREAM-SYNC.md\` to merge.`,
              labels: ['upstream-sync']
            });
